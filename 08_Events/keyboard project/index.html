<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .outter {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }
    </style>
</head>

<body style="background-color: black;color:white">
    <div class="outter">
        <h1>Press Any Key in Keyboard</h1>

        <div class="insert">

        </div>

    </div>

    <script>
        const insert = document.querySelector('.insert')


        window.addEventListener('keydown', function (e) {
            insert.innerHTML = `
            <table>
            <tr>
                <th>Key</th>
                <th>Key Code</th>
                <th>Code</th>
            </tr>
            <tr>
                <td>${e.key === ' ' ? "space" : e.key}</td>
                <td>${e.keyCode}</td>
                <td>${e.code}</td>
            </tr>

        </table>
            `
        })
    </script>
</body>

</html>
