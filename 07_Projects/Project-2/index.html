<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>BMI Calculator</title>
  </head>
  <body style="background-color: #212121; padding: 5rem ;color:white">
    
    </nav>
    <div class="container">
      <h1 class="text-3xl">BMI Calculator</h1>
      <form class="gap-[2rem] mt-[3rem] grid">
        <p><label>Height in CM: </label><input type="text" id="height" placeholder="Enter height"  class="rounded p-[.4rem] text-black bg-gray-100 placeholder-gray-400"/></p>
        <p><label>Weight in KG: </label><input type="text" id="weight" placeholder="Enter weight"  class="rounded p-[.4rem] text-black bg-gray-100 placeholder-gray-400"/></p>
        <button class="bg-green-500 rounded px-[1rem] py-[.5rem]">Calculate</button>
        <div id="results" style="font-size:3rem;"></div>
        <div id="weight-guide">
          <h3>BMI Weight Guide</h3>
          <p>Under Weight = Less than 18.6</p>
          <p>Normal Range = 18.6 and 24.9</p>
          <p>Overweight = Greater than 24.9</p>
        </div>
      </form>
    </div>
  </body>
  <script src="chaiaurcode.js"></script>
</html>
