<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body style="background-color: #212121; padding: 5rem">
    <div class="w-full flex justify-center">
      <p class="text-4xl text-green-500">
        Click box to Color Change of Body bg
      </p>
    </div>

    <div class="w-full flex justify-center gap-4 mt-[5rem]">
      <div id="white" class="box w-[6rem] h-[6rem] border bg-white"></div>
      <div id="red" class="box w-[6rem] h-[6rem] border bg-red-500"></div>
      <div id="blue" class="box w-[6rem] h-[6rem] border bg-blue-500"></div>
      <div id="pink" class="box w-[6rem] h-[6rem] border bg-pink-500"></div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
